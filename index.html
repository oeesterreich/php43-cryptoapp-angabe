<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>CryptoApp</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="assets/styles.css"/>
    <!-- Import Vue.js -->
    <script src="https://unpkg.com/vue@3.0.0-beta.12/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
<div id="app">
    <div class="nav-bar"><h3>CryptoApp</h3></div>
    <app-display :prices="prices" :purchases="purchases" :wallets="wallets" @add-to-wallet="addPurchase" @delete-purchase="deletePurchase" @add-wallet="addWallet"></app-display>
</div>

<!-- Import App -->
<script src="main.js"></script>

<!-- Import Components -->
<script src="components/PurchaseList.js"></script>
<script src="components/WalletList.js"></script>
<script src="components/WalletDetail.js"></script>
<script src="components/PurchaseForm.js"></script>
<script src="components/AppDisplay.js"></script>

<!-- Mount App -->
<script>
    app.mount('#app');
</script>
</body>
</html>
